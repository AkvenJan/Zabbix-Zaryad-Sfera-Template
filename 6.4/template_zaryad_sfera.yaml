                  value: 'String {#STRING}'
            - uuid: d0eeab46b90a49d6a32185f35d9dd41f
              name: 'Battery {#SNMPINDEX} Temperature'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.54661.1.1.1.5.2.{#STRINGINDEX}.3.1.1.4.{#BATTERY}'
              key: 'pulseBatteryTemperature[{#SNMPINDEX}]'
              delay: 10m
              history: 7d
              value_type: FLOAT
              trends: 30d
              units: °C
              preprocessing:
                - type: MULTIPLIER
                  parameters:
                    - '0.1'
              tags:
                - tag: Application
                  value: 'String {#STRING}'
            - uuid: ca0387c9e56c4dd99a90fa33d7a840dc
              name: 'Battery {#SNMPINDEX} Voltage'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.54661.1.1.1.5.2.{#STRINGINDEX}.3.1.1.3.{#BATTERY}'
              key: 'pulseBatteryVoltage[{#SNMPINDEX}]'
              delay: 5m
              history: 7d
              value_type: FLOAT
              trends: 30d
              units: V
              preprocessing:
                - type: MULTIPLIER
                  parameters:
                    - '0.01'
              tags:
                - tag: Application
                  value: 'String {#STRING}'
          trigger_prototypes:
            - uuid: e8ac188fc09a49b4b7d6998c58597898
              expression: 'last(/Zaryad Sfera/pulseBatteryCommonState[{#SNMPINDEX}])=3 and last(/Zaryad Sfera/pulseBatterySOC[{#SNMPINDEX}])>=0'
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'last(/Zaryad Sfera/pulseBatteryCommonState[{#SNMPINDEX}])=1'
              name: 'Battery {#SNMPINDEX}: error'
              opdata: 'SoC: {ITEM.LASTVALUE2}%'
              priority: AVERAGE
              manual_close: 'YES'
            - uuid: 9fef4ae186814a39aaeafade171920b2
              expression: 'last(/Zaryad Sfera/pulseBatteryCommonState[{#SNMPINDEX}])=2 and last(/Zaryad Sfera/pulseBatterySOC[{#SNMPINDEX}])>=0'
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'last(/Zaryad Sfera/pulseBatteryCommonState[{#SNMPINDEX}])=1'
              name: 'Battery {#SNMPINDEX}: warning'
              opdata: 'SoC: {ITEM.LASTVALUE2}%'
              priority: WARNING
              manual_close: 'YES'
              dependencies:
                - name: 'Battery {#SNMPINDEX}: error'
                  expression: 'last(/Zaryad Sfera/pulseBatteryCommonState[{#SNMPINDEX}])=3 and last(/Zaryad Sfera/pulseBatterySOC[{#SNMPINDEX}])>=0'
                  recovery_expression: 'last(/Zaryad Sfera/pulseBatteryCommonState[{#SNMPINDEX}])=1'
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var inArray = JSON.parse(value);
                  var outArray = [];
                  
                  var lines = 0;
                  var maxIndex = 0;
                  
                  inArray.forEach(function(item) {
                    var snmpIndex = item["{#SNMPINDEX}"];
                    if (snmpIndex === "0") {
                      // это нулевой элемент, содержит количество линий
                      lines = parseInt(item["{#STRING}"], 10);
                    } else {
                      // остальные элементы содержат серийные номера, по их индексу определяем количество батарей в линии
                      var idx = parseInt(snmpIndex, 10);
                      if (idx > maxIndex) {
                        maxIndex = idx;
                      }
                    }
                  });
                  
                  var batteriesPerLine = maxIndex;
                  
                  // Генерируем итоговые элементы
                  for (var i = 1; i <= lines; i++) {
                    for (var j = 1; j <= batteriesPerLine; j++) {
                      var obj = {};
                      obj["{#SNMPINDEX}"] = i + "." + j;
                      obj["{#STRINGINDEX}"] = (i + 1).toString();
                      obj["{#STRING}"] = i.toString();
                      obj["{#BATTERY}"] = j.toString();
                      outArray.push(obj);
                    }
                  }
                  
                  return JSON.stringify(outArray);
