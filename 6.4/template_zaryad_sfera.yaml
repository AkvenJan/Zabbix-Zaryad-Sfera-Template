      discovery_rules:
        - uuid: 7403d81b1eb14b9d9020385f9b5cd902
          name: 'Battery Discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#STRING},1.3.6.1.4.1.54661.1.1.1.5.2.1.1.3,{#SERIAL},1.3.6.1.4.1.54661.1.1.1.5.2.2.3.1.1.2]'
