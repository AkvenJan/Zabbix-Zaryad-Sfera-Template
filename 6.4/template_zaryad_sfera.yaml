          delay: 12h
          description: 'Discovery of all of the batteries in all of the strings'
          item_prototypes:
            - uuid: b2827635170d444a8b9d0f610fd2fbc8
              name: 'Battery {#SNMPINDEX} State'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.54661.1.1.1.5.2.{#STRINGINDEX}.3.1.1.14.{#BATTERY}'
              key: 'pulseBatteryCommonState[{#SNMPINDEX}]'
