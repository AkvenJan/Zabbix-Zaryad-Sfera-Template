            - uuid: 05b005a8c999492594c6878690eb1dbf
              name: 'Battery {#SNMPINDEX} SoC'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.54661.1.1.1.5.2.{#STRINGINDEX}.3.1.1.6.{#BATTERY}'
